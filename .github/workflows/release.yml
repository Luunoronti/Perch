name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Embed Windows version info (from tag)
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          for dir in cmd/client cmd/server; do
            jq --argjson major "${MAJOR:-0}" --argjson minor "${MINOR:-0}" --argjson patch "${PATCH:-0}" --arg ver "$VERSION.0" '
              .FixedFileInfo.FileVersion = {Major:$major,Minor:$minor,Patch:$patch,Build:0} |
              .FixedFileInfo.ProductVersion = {Major:$major,Minor:$minor,Patch:$patch,Build:0} |
              .StringFileInfo.FileVersion = $ver |
              .StringFileInfo.ProductVersion = $ver
            ' "$dir/versioninfo.json" > "$dir/versioninfo.tmp.json"
            mv "$dir/versioninfo.tmp.json" "$dir/versioninfo.json"
            (cd "$dir" && "$(go env GOPATH)/bin/goversioninfo" -o resource_windows_amd64.syso -64 versioninfo.json)
          done

      - name: Build server (windows/amd64)
        # -H=windowsgui: GUI subsystem so tray mode never flashes a console;
        # console mode reattaches to the parent terminal at runtime.
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-H=windowsgui" -o dist/perch-server.exe ./cmd/server

      - name: Build client (linux/386)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=386 go build -o dist/perch-386 ./cmd/client

      - name: Build client (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/perch-amd64 ./cmd/client

      - name: Build client (windows/amd64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/perch-windows-amd64.exe ./cmd/client

      - name: Checksums
        working-directory: dist
        run: sha256sum perch-server.exe perch-386 perch-amd64 perch-windows-amd64.exe > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/perch-server.exe
            dist/perch-386
            dist/perch-amd64
            dist/perch-windows-amd64.exe
            dist/checksums.txt
          generate_release_notes: true
